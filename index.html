<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="src/css/style.css">
    <title>Dev | Login & Registration</title>
</head>

<body>
    
    <!-- cabeçalho -->
    <header class="cabecalho">
        
        <!-- logo -->
        <img src="src/img/logo-tipo.png" alt="logo-tipo">
        
        <!-- menu -->
        <nav class="menu-descktop">
            
            <ul>
                
                <li><a href="#" title="Home">Home</a></li>
                
                <li><a href="#" title="Blog">Blog</a></li>
                
                <li><a href="#" title="Services">Services</a></li>
               
                <li><a href="#" title="About">About</a></li>
                
                <li><a href="#" title="contact">Contact</a></li>
            
            </ul>
        
        </nav>
       
        <!-- botão de login e registro -->
        <div class="box-button">
            
            <button type="submit" class="btn-sign-in active">Sign in</button>
            
            <button type="submit" class="btn-sign-up">Sign up</button>
        
        </div>
    
    </header>
    
    <!-- formulário principal -->
    <div class="main-form">
        
        <!-- login form -->
        <div class="box-form login">
            
            <!-- login form header -->
            <h2>Login</h2>
            
            <!-- login form body -->
            <form action="#" method="post" autocomplete="off">
                
                <div class="group-element">
                   
                    <i class="bi bi-envelope"></i>
                    
                        <input type="email" name="email" id="email" placeholder=" " required>
                    
                    <label >Email</label>
                
                </div>
                
                <div class="group-element">
                    
                    <i class="bi bi-eye" id="icon-eye-login"></i>
                    
                        <input type="password" name="password" id="password-login" placeholder=" " required>
                    
                    <label>Password</label>
                
                </div>
                
                <button type="submit" class="btn-form">Sign in</button>
                
                <div class="remenber-forgot">
                    
                    <label> <input type="checkbox" name="remember" id="remember"> Remember Me</label>
                    
                    <a href="#">Forgot password</a>
                
                </div>
                
                <!-- continue with social login -->
                <div class="box-continue">
                    
                    <div></div>
                    
                    <span>or continue</span>
                    
                    <div></div>
               
                </div>
               
                <!-- social login -->
                <div class="social">
                   
                    <a href="#"><img src="src/img/facebook.png" alt="facebook"></a>
                    
                    <a href="#"><img src="src/img/google.png" alt="google"></a>
                    
                    <a href="#"><img src="src/img/apple.png" alt="apple"></a>
                
                </div>
            </form>
        
        </div>
        
        <!-- registration form -->
        <div class="box-form registration">
            
            <!-- registration form header -->
            <h2>Registration</h2>
            
            <!-- registration form body -->
            <form action="#" method="post" autocomplete="off">
                
                <div class="group-element">
                    
                    <i class="bi bi-person"></i>
                    
                        <input type="text" name="username" id="username" placeholder=" " required>
                    
                    <label >Username</label>
                
                </div>
                
                <div class="group-element">
                    
                    <i class="bi bi-envelope"></i>
                    
                        <input type="email" name="email" id="email" placeholder=" " required>
                    
                    <label >Email</label>
                
                </div>
                
                <div class="group-element">
                    
                    <i class="bi bi-eye" id="icon-eye-registration"></i>
                    
                        <input type="password" name="password" id="password-registration" placeholder=" " required>
                    
                    <label>Password</label>
                
                </div>
                
                <!-- submit button -->
                <button type="submit" class="btn-form">Sign up</button>
                
                <!-- terms and conditions -->
                <div class="remenber-forgot">
                    
                    <label><input type="checkbox"> I agree to the terms and conditions</label>
                
                </div> 
                
            </form>
        
        </div>

    </div>

    <script src="src/js/script.js"></script>
</body>

</html>
